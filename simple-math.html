<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>Simple Math</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    background: #f5f0e0;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .nav {
    align-self: flex-start;
    margin-bottom: 8px;
  }
  .nav a {
    font-size: 18px;
    color: #1976d2;
    text-decoration: none;
    font-weight: 600;
  }

  h1 {
    color: #2e7d32;
    font-size: 28px;
    margin-bottom: 12px;
    text-align: center;
  }

  .mode-selector {
    display: flex;
    gap: 0;
    margin-bottom: 12px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .mode-btn {
    font-size: 18px;
    font-weight: 600;
    padding: 12px 24px;
    border: none;
    background: #fff;
    color: #555;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, color 0.15s;
  }
  .mode-btn.active {
    background: #2e7d32;
    color: #fff;
  }

  .settings {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .settings label {
    font-size: 18px;
    color: #555;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .settings input[type="checkbox"] {
    width: 28px;
    height: 28px;
    accent-color: #2e7d32;
  }

  .feedback {
    text-align: center;
    font-size: 30px;
    font-weight: 700;
    min-height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
  }
  .feedback.correct { color: #2e7d32; }
  .feedback.wrong { color: #c62828; }

  .problem-card {
    background: #fff;
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .problem-num {
    font-size: 80px;
    font-weight: 700;
    color: #333;
    line-height: 1;
  }

  .problem-op {
    font-size: 60px;
    font-weight: 700;
    color: #2e7d32;
    margin: 0 10px;
    line-height: 1;
  }

  .answer-box {
    font-size: 80px;
    font-weight: 700;
    color: #1976d2;
    min-width: 100px;
    height: 100px;
    border: 4px dashed #aaa;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .answer-box.has-value {
    border: 4px solid #1976d2;
    background: #e3f2fd;
  }

  .numpad {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 400px;
    margin-bottom: 16px;
  }

  .numpad button {
    font-size: 36px;
    font-weight: 700;
    padding: 16px 0;
    border: none;
    border-radius: 12px;
    background: #fff;
    color: #333;
    box-shadow: 0 3px 0 #ccc;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .numpad button:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #ccc;
  }
  .numpad button.backspace {
    font-size: 28px;
    background: #e0e0e0;
    color: #555;
    box-shadow: 0 3px 0 #bdbdbd;
  }

  .buttons {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .buttons button {
    font-size: 22px;
    font-weight: 600;
    padding: 14px 36px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.08s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .buttons button:active {
    transform: scale(0.95);
  }

  .btn-check {
    background: #2e7d32;
    color: #fff;
    box-shadow: 0 4px 0 #1b5e20;
  }
  .btn-check:active {
    box-shadow: 0 2px 0 #1b5e20;
    transform: translateY(2px) scale(0.95);
  }

  .btn-reset {
    background: #e0e0e0;
    color: #555;
    box-shadow: 0 4px 0 #bdbdbd;
    font-size: 18px;
    padding: 14px 24px;
  }

  .score {
    text-align: center;
    font-size: 18px;
    color: #666;
    margin-bottom: 10px;
  }

  .confetti {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>

<div class="nav"><a href="index.html">&larr; Menu</a></div>

<h1>Simple Math</h1>

<div class="mode-selector">
  <button class="mode-btn active" data-mode="addition" onclick="setMode('addition')">Addition</button>
  <button class="mode-btn" data-mode="subtraction" onclick="setMode('subtraction')">Subtraction</button>
  <button class="mode-btn" data-mode="all" onclick="setMode('all')">All</button>
</div>

<div class="settings">
  <label>
    <input type="checkbox" id="allowLargeSums">
    Answers above 10
  </label>
</div>

<div class="feedback" id="feedback"></div>

<div class="problem-card" id="problem"></div>

<div class="numpad" id="numpad"></div>

<div class="buttons">
  <button class="btn-reset" onclick="clearAnswer()">Clear</button>
  <button class="btn-check" onclick="checkAnswer()">Check</button>
</div>

<div class="score" id="score"></div>

<canvas class="confetti" id="confetti"></canvas>

<script>
var a = 0, b = 0, op = '+', answer = '';
var totalCorrect = 0, totalProblems = 0;
var answered = false, advancing = false;
var mode = 'addition';
var allowLarge = false;

document.getElementById('allowLargeSums').addEventListener('change', function() {
  allowLarge = this.checked;
  newProblem();
});

function setMode(m) {
  mode = m;
  var btns = document.querySelectorAll('.mode-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].getAttribute('data-mode') === m);
  }
  newProblem();
}

function buildNumpad() {
  var pad = document.getElementById('numpad');
  var html = '';
  for (var i = 0; i <= 9; i++) {
    html += '<button onclick="tapNumber(' + i + ')">' + i + '</button>';
  }
  html += '<button class="backspace" onclick="backspace()">&larr;</button>';
  pad.innerHTML = html;
}

function pickOp() {
  if (mode === 'addition') return '+';
  if (mode === 'subtraction') return '\u2212';
  return Math.random() < 0.5 ? '+' : '\u2212';
}

function newProblem() {
  op = pickOp();
  if (op === '+') {
    if (allowLarge) {
      a = Math.floor(Math.random() * 10);
      b = Math.floor(Math.random() * 10);
    } else {
      a = Math.floor(Math.random() * 10);
      b = Math.floor(Math.random() * (Math.min(10 - a, 9) + 1));
    }
  } else {
    if (allowLarge) {
      var result = Math.floor(Math.random() * 10);
      b = Math.floor(Math.random() * 10);
      a = result + b;
    } else {
      a = Math.floor(Math.random() * 10);
      b = Math.floor(Math.random() * (a + 1));
    }
  }
  answer = '';
  answered = false;
  advancing = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  renderProblem();
  updateScore();
}

function renderProblem() {
  var html = '<span class="problem-num">' + a + '</span>';
  html += '<span class="problem-op">' + op + '</span>';
  html += '<span class="problem-num">' + b + '</span>';
  html += '<span class="problem-op">=</span>';
  html += '<span class="answer-box' + (answer ? ' has-value' : '') + '">' + answer + '</span>';
  document.getElementById('problem').innerHTML = html;
}

function tapNumber(n) {
  if (advancing) return;
  playTapSound();
  if (answer.length >= 2) return;
  answer += '' + n;
  if (answer.length === 2 && answer[0] === '0') answer = '' + n;
  renderProblem();
}

function backspace() {
  if (advancing) return;
  if (answer.length > 0) {
    answer = answer.slice(0, -1);
    renderProblem();
  }
}

function clearAnswer() {
  if (advancing) return;
  answer = '';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  renderProblem();
}

function checkAnswer() {
  if (advancing) return;
  var fb = document.getElementById('feedback');
  var correct = op === '+' ? a + b : a - b;
  var userAnswer = parseInt(answer);

  if (answer === '') {
    fb.textContent = 'Tap a number!';
    fb.className = 'feedback wrong';
    playWrongSound();
    return;
  }

  if (userAnswer === correct) {
    fb.textContent = 'Correct! ' + a + ' ' + op + ' ' + b + ' = ' + correct;
    fb.className = 'feedback correct';
    if (!answered) {
      totalCorrect++;
      totalProblems++;
      answered = true;
    }
    playCorrectSound();
    launchConfetti();
    advancing = true;
    setTimeout(function() { newProblem(); }, 2000);
  } else {
    fb.textContent = 'Not quite \u2014 try again!';
    fb.className = 'feedback wrong';
    playWrongSound();
    if (!answered) {
      totalProblems++;
      answered = true;
    }
  }
  updateScore();
}

function updateScore() {
  var el = document.getElementById('score');
  if (totalProblems > 0) {
    el.textContent = totalCorrect + ' correct out of ' + totalProblems + ' problems';
  } else {
    el.textContent = '';
  }
}

var audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTapSound() {
  var ctx = getAudioCtx();
  var now = ctx.currentTime;
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 880;
  gain.gain.setValueAtTime(0.1, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(now);
  osc.stop(now + 0.08);
}

function playCorrectSound() {
  var ctx = getAudioCtx();
  var now = ctx.currentTime;
  var notes = [523, 659, 784];
  notes.forEach(function(freq, i) {
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.25, now + i * 0.12);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.4);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now + i * 0.12);
    osc.stop(now + i * 0.12 + 0.4);
  });
}

function playWrongSound() {
  var ctx = getAudioCtx();
  var now = ctx.currentTime;
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(300, now);
  osc.frequency.linearRampToValueAtTime(200, now + 0.3);
  gain.gain.setValueAtTime(0.15, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(now);
  osc.stop(now + 0.3);
}

function launchConfetti() {
  var canvas = document.getElementById('confetti');
  var ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  var colors = ['#4caf50','#ff9800','#2196f3','#e91e63','#ffeb3b','#9c27b0'];
  var pieces = [];
  for (var i = 0; i < 80; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * 100,
      w: 8 + Math.random() * 8,
      h: 6 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * Math.PI * 2,
      rv: (Math.random() - 0.5) * 0.2
    });
  }
  var frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var alive = false;
    for (var i = 0; i < pieces.length; i++) {
      var p = pieces[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.rot += p.rv;
      if (p.y < canvas.height + 20) alive = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    }
    frame++;
    if (alive && frame < 180) {
      requestAnimationFrame(draw);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
  draw();
}

buildNumpad();
newProblem();
</script>
</body>
</html>
