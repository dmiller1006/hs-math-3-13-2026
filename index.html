<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>HS Math</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    background: #f5f0e0;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    -webkit-user-select: none;
    user-select: none;
  }
  h1 {
    color: #2e7d32;
    font-size: 36px;
    margin-bottom: 30px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 600px;
  }
  a.card {
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    text-decoration: none;
    color: #333;
    transition: transform 0.1s, box-shadow 0.1s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  a.card:active {
    transform: scale(0.97);
    box-shadow: 0 1px 6px rgba(0,0,0,0.1);
  }
  .card-icon {
    font-size: 40px;
    margin-bottom: 10px;
  }
  .card-title {
    font-size: 22px;
    font-weight: 700;
    color: #2e7d32;
    margin-bottom: 6px;
  }
  .card-desc {
    font-size: 16px;
    color: #777;
  }
</style>
</head>
<body>
<h1>HS Math</h1>
<div class="grid">
  <a class="card" href="counting-circles.html">
    <div class="card-icon">&#x1F7E2;</div>
    <div class="card-title">Counting Circles</div>
    <div class="card-desc">Color circles to match a number (10–30)</div>
  </a>
  <a class="card" href="addition.html">
    <div class="card-icon">&#x2795;</div>
    <div class="card-title">Addition</div>
    <div class="card-desc">Solve addition problems (adding 0, 1, and 2)</div>
  </a>
</div>
</body>
</html>
