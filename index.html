<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>Color Circles to Match</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    background: #f5f0e0;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  h1 {
    color: #2e7d32;
    font-size: 28px;
    margin-bottom: 8px;
    text-align: center;
  }

  .settings {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .settings label {
    font-size: 18px;
    color: #555;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .settings input[type="checkbox"] {
    width: 28px;
    height: 28px;
    accent-color: #2e7d32;
  }

  .exercise {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    width: fit-content;
    max-width: calc(100vw - 40px);
    margin-bottom: 20px;
  }

  .exercise-layout {
    display: flex;
    align-items: flex-start;
    gap: 20px;
  }

  .exercise-layout.stacked {
    flex-direction: column;
    align-items: center;
  }

  .number-box {
    background: #2e7d32;
    color: #fff;
    font-size: 72px;
    font-weight: 700;
    min-width: 110px;
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    flex-shrink: 0;
    line-height: 1;
  }

  .circles-area {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .circle-row {
    display: flex;
    align-items: center;
  }

  .circle-group {
    display: flex;
    gap: 4px;
  }

  .group-divider {
    width: 4px;
    height: 54px;
    background: #444;
    margin: 0 5px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .circle {
    width: 50px;
    height: 50px;
    border: 3px dashed #aaa;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, transform 0.08s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
    touch-action: manipulation;
  }

  .circle:active {
    transform: scale(0.9);
  }

  .circle.filled {
    background: #4caf50;
    border: 3px solid #2e7d32;
  }

  .circle.filled::after {
    content: '';
    width: 20px;
    height: 20px;
    background: #2e7d32;
    border-radius: 50%;
  }

  .buttons {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  button {
    font-size: 22px;
    font-weight: 600;
    padding: 14px 36px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.08s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  button:active {
    transform: scale(0.95);
  }

  .btn-check {
    background: #2e7d32;
    color: #fff;
    box-shadow: 0 4px 0 #1b5e20;
  }
  .btn-check:active {
    box-shadow: 0 2px 0 #1b5e20;
    transform: translateY(2px) scale(0.95);
  }

  .btn-reset {
    background: #e0e0e0;
    color: #555;
    box-shadow: 0 4px 0 #bdbdbd;
    font-size: 18px;
    padding: 14px 24px;
  }

  .feedback {
    text-align: center;
    font-size: 30px;
    font-weight: 700;
    min-height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
  }

  .feedback.correct { color: #2e7d32; }
  .feedback.wrong { color: #c62828; }

  .score {
    text-align: center;
    font-size: 18px;
    color: #666;
    margin-bottom: 10px;
  }

  /* iPad landscape */
  @media (min-width: 700px) {
    .exercise { padding: 32px; }
    .number-box {
      font-size: 88px;
      min-width: 130px;
      height: 130px;
    }
    .circle { width: 54px; height: 54px; }
    .circle.filled::after { width: 22px; height: 22px; }
    .group-divider { height: 58px; }
  }

  /* Small phones */
  @media (max-width: 500px) {
    .circle {
      width: 36px;
      height: 36px;
      border-width: 2px;
    }
    .circle.filled { border-width: 2px; }
    .circle.filled::after { width: 14px; height: 14px; }
    .group-divider { height: 40px; width: 3px; margin: 0 3px; }
    .number-box {
      font-size: 48px;
      min-width: 76px;
      height: 76px;
    }
    .circle-group { gap: 3px; }
    .exercise-layout { gap: 12px; }
  }

  .confetti {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>

<h1>Color Circles to Match</h1>

<div class="settings">
  <label>
    <input type="checkbox" id="allow25">
    Numbers up to 30
  </label>
  <label>
    <input type="checkbox" id="inOrder" checked>
    Count in order
  </label>
</div>

<div class="feedback" id="feedback"></div>

<div class="exercise" id="exercise"></div>

<div class="buttons">
  <button class="btn-reset" onclick="resetCircles()">Clear</button>
  <button class="btn-check" onclick="checkAnswer()">Check</button>
</div>

<div class="score" id="score"></div>

<canvas class="confetti" id="confetti"></canvas>

<script>
var targetNumber = 0;
var totalCorrect = 0;
var totalProblems = 0;
var maxNumber = 20;
var answered = false;
var advancing = false;
var successiveOnly = true;

document.getElementById('allow25').addEventListener('change', function() {
  maxNumber = this.checked ? 30 : 20;
  newProblem();
});

document.getElementById('inOrder').addEventListener('change', function() {
  successiveOnly = this.checked;
});

function newProblem() {
  targetNumber = 10 + Math.floor(Math.random() * (maxNumber - 10 + 1));
  answered = false;
  advancing = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  renderExercise();
  updateScore();
}

function renderExercise() {
  var container = document.getElementById('exercise');
  var totalCircles = maxNumber <= 20 ? 20 : 30;
  var rowCount = totalCircles / 10;
  var stacked = rowCount > 2;

  var html = '<div class="exercise-layout' + (stacked ? ' stacked' : '') + '">';
  html += '<div class="number-box">' + targetNumber + '</div>';
  html += '<div class="circles-area">';

  for (var row = 0; row < rowCount; row++) {
    html += '<div class="circle-row">';
    html += '<div class="circle-group">';
    for (var col = 0; col < 5; col++) {
      var idx = row * 10 + col;
      html += '<div class="circle" data-idx="' + idx + '"></div>';
    }
    html += '</div>';
    html += '<div class="group-divider"></div>';
    html += '<div class="circle-group">';
    for (var col2 = 5; col2 < 10; col2++) {
      var idx2 = row * 10 + col2;
      html += '<div class="circle" data-idx="' + idx2 + '"></div>';
    }
    html += '</div>';
    html += '</div>';
  }

  html += '</div></div>';
  container.innerHTML = html;
}

// Attach touch/click handler once via event delegation
document.getElementById('exercise').addEventListener('pointerdown', handleCircleTap);

function handleCircleTap(e) {
  var circle = e.target.closest('.circle');
  if (!circle || advancing) return;
  e.preventDefault();

  if (successiveOnly) {
    var idx = parseInt(circle.getAttribute('data-idx'));
    var filledCount = document.querySelectorAll('.circle.filled').length;
    if (circle.classList.contains('filled')) {
      // Only allow unfilling the last filled circle
      if (idx !== filledCount - 1) return;
    } else {
      // Only allow filling the next circle in sequence
      if (idx !== filledCount) return;
    }
  }

  var filling = !circle.classList.contains('filled');
  circle.classList.toggle('filled');
  playTapSound(filling);
}

function playTapSound(filling) {
  var ctx = getAudioCtx();
  var now = ctx.currentTime;
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = filling ? 880 : 440;
  gain.gain.setValueAtTime(0.1, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(now);
  osc.stop(now + 0.08);
}

function resetCircles() {
  if (advancing) return;
  var filled = document.querySelectorAll('.circle.filled');
  for (var i = 0; i < filled.length; i++) {
    filled[i].classList.remove('filled');
  }
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
}

function checkAnswer() {
  if (advancing) return;
  var filled = document.querySelectorAll('.circle.filled').length;
  var fb = document.getElementById('feedback');

  if (filled === targetNumber) {
    fb.textContent = 'Correct! ' + filled + ' = ' + targetNumber;
    fb.className = 'feedback correct';
    if (!answered) {
      totalCorrect++;
      totalProblems++;
      answered = true;
    }
    playCorrectSound();
    launchConfetti();
    advancing = true;
    setTimeout(function() {
      newProblem();
    }, 2000);
  } else {
    var hint = '';
    if (filled === 0) {
      hint = 'Tap the circles first!';
    } else if (filled > targetNumber) {
      hint = 'Too many! You colored ' + filled + '.';
    } else {
      hint = 'Not enough! You colored ' + filled + '.';
    }
    playWrongSound();
    fb.textContent = hint;
    fb.className = 'feedback wrong';
    if (!answered) {
      totalProblems++;
      answered = true;
    }
  }
  updateScore();
}

function updateScore() {
  var el = document.getElementById('score');
  if (totalProblems > 0) {
    el.textContent = totalCorrect + ' correct out of ' + totalProblems + ' problems';
  } else {
    el.textContent = '';
  }
}

// Sound effects via Web Audio API
var audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playCorrectSound() {
  var ctx = getAudioCtx();
  var now = ctx.currentTime;
  var notes = [523, 659, 784]; // C5, E5, G5 — ascending major chord
  notes.forEach(function(freq, i) {
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.25, now + i * 0.12);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.4);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now + i * 0.12);
    osc.stop(now + i * 0.12 + 0.4);
  });
}

function playWrongSound() {
  var ctx = getAudioCtx();
  var now = ctx.currentTime;
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(300, now);
  osc.frequency.linearRampToValueAtTime(200, now + 0.3);
  gain.gain.setValueAtTime(0.15, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(now);
  osc.stop(now + 0.3);
}

// Confetti animation
function launchConfetti() {
  var canvas = document.getElementById('confetti');
  var ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  var colors = ['#4caf50','#ff9800','#2196f3','#e91e63','#ffeb3b','#9c27b0'];
  var pieces = [];
  for (var i = 0; i < 80; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * 100,
      w: 8 + Math.random() * 8,
      h: 6 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * Math.PI * 2,
      rv: (Math.random() - 0.5) * 0.2
    });
  }

  var frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var alive = false;
    for (var i = 0; i < pieces.length; i++) {
      var p = pieces[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.rot += p.rv;
      if (p.y < canvas.height + 20) alive = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    }
    frame++;
    if (alive && frame < 180) {
      requestAnimationFrame(draw);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
  draw();
}

newProblem();
</script>
</body>
</html>
